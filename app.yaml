# DigitalOcean App Platform — outbackheli-app
# NOTE: DigitalOcean holds the live app spec in its dashboard; this file is a
# reference copy so the topology is visible in the repo. If they drift, the
# dashboard wins. Current topology:
#   • static site "opsforms"  — serves the PWA + admin at /   (build copies files to _static)
#   • web service "opsforms2" — node server.js, receives /api/* (prefix is stripped)
name: outbackheli-app
region: syd
services:
  - name: opsforms2
    environment_slug: node-js
    github: { repo: outbackhelicopters/opsforms, branch: main, deploy_on_push: true }
    source_dir: /
    run_command: node server.js
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
static_sites:
  - name: opsforms
    environment_slug: html
    github: { repo: outbackhelicopters/opsforms, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: mkdir -p _static && cp *.html *.js manifest.json logo.png icon-180.png icon-192.png icon-512.png _static/ 2>/dev/null; exit 0
ingress:
  rules:
    - { component: { name: opsforms },  match: { path: { prefix: / } } }
    - { component: { name: opsforms2 }, match: { path: { prefix: /api } } }
# Environment variables (set in dashboard, encrypted):
#   SENDER_EMAIL, OPS_EMAIL, MS_TENANT_ID, MS_CLIENT_ID, MS_CLIENT_SECRET,
#   ONEDRIVE_FOLDER, SESSION_SECRET, TWILIO_* (optional), DEVICE_TOKEN (enforcement)
