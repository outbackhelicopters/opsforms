# Digital Ocean App Platform — Outback Helicopter Airwork NT
# Single Node.js service that serves both the static PWA files and the /api/* endpoints.
# The Express server uses express.static to serve index.html, flight-ops.html, job-advice.html etc.
# Routes: ALL traffic (/) goes through this service.

name: outbackheli-app

services:
  - name: api
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/heli-app   # ← update this if using doctl
      branch: main
      deploy_on_push: true
    build_command: cd api && npm install --production
    run_command: node api/server.js
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 3000
    routes:
      - path: /          # ← CHANGED: was /api — now serves ALL routes including static files
    envs:
      - key: SENDER_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: OPS_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: MS_TENANT_ID
        scope: RUN_TIME
        type: SECRET
      - key: MS_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: MS_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ONEDRIVE_FOLDER
        scope: RUN_TIME
        value: Helicopter Paperwork

# Static site component removed — Express now serves static files directly.
# This avoids the DO static site limitation where newly added files weren't served.
